<!DOCTYPE html>
<html lang="en">
<head>
    <title>Enter Polling Station | TAT Voting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* DYNAMIC BACKGROUND ANIMATION */
        body {
            /* A deep, trustworthy gradient that shifts slowly */
            background: linear-gradient(-45deg, #020024, #090979, #00d4ff, #005bea);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* CARD STYLING (Glassmorphism) */
        .voting-card {
            background: rgba(255, 255, 255, 0.95); /* Slightly transparent white */
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            animation: slideUp 0.8s ease-out;
        }

        /* ENTRANCE ANIMATION */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* FORM ELEMENTS */
        .form-control {
            border-radius: 50px; /* Rounded pill shape */
            padding: 12px 20px;
            border: 2px solid #eee;
            transition: all 0.3s;
        }

        .form-control:focus {
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        .btn-vote {
            background: linear-gradient(45deg, #090979, #00d4ff);
            border: none;
            border-radius: 50px;
            padding: 12px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: transform 0.2s;
        }

        .btn-vote:hover {
            transform: scale(1.03); /* Grow slightly on hover */
            background: linear-gradient(45deg, #00d4ff, #090979);
        }

        .icon-header {
            font-size: 3rem;
            background: -webkit-linear-gradient(#090979, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="voting-card text-center">
        <div class="mb-3">
            <i class="fa-solid fa-check-to-slot icon-header"></i>
        </div>
        
        <h3 class="fw-bold text-dark mb-1">TAT Polling Station</h3>
        <p class="text-muted small mb-4">Secure Blockchain Identity Verification</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} py-2 small shadow-sm">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="text-start">
            <div class="mb-3">
                <label class="form-label ms-2 small fw-bold text-secondary">Voter ID (Username)</label>
                <input type="text" name="username" class="form-control" placeholder="Enter your ID" required>
            </div>
            <div class="mb-4">
                <label class="form-label ms-2 small fw-bold text-secondary">Secure Key (Password)</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your key" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-vote shadow">
                <i class="fa-solid fa-right-to-bracket me-2"></i> Enter Booth
            </button>
        </form>

        <div class="mt-4 pt-3 border-top">
            <small class="text-muted">Not registered yet?</small><br>
            <a href="/register" class="text-decoration-none fw-bold" style="color: #090979;">Request Voter Access</a>
        </div>
    </div>

</body>
</html>
